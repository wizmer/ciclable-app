Summary: Cyclist traffic counting application
Description: |-
  Ciclable is a mobile application designed for counting cyclists and other
  road users at specific locations. The app supports both online and offline
  modes with automatic data synchronization when connectivity is restored.
  
  Key Features:
  * Interactive Google Maps interface showing counting locations
  * Offline-first architecture with local data storage
  * Two counting modes: directed (with road tracking) and non-directed
  * Automatic synchronization of offline counts when online
  * Support for multiple vehicle types (bikes, e-bikes, scooters, cargo bikes)
  * Support for multiple user types (commuters, students, tourists, etc.)
  * Undo functionality for accidental counts
  * Real-time location tracking
  
  The app is designed for volunteer organizations and municipalities conducting
  traffic studies to understand cyclist movement patterns and improve cycling
  infrastructure.

